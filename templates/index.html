{% extends "base.html" %}

{% block body_class %} home{% endblock %}
{% block og_type %}website{% endblock %}

{% block content %}
<section class="hero titled stack text-center">
  <h1>{{ config.title }}</h1>
  <p class="tagline">{{ config.extra.tagline }}</p>
  <nav class="home-nav cluster" style="--flow-space: var(--space-l)" aria-label="Site navigation">
    <a href="/poems/" class="link-muted">Poesía</a>
    <a href="/about/" class="link-muted">Acerca</a>
  </nav>
  <img class="hero-illustration" src="{{ get_url(path='flower.jpg') }}" alt="Musk Mallow botanical illustration" title="J. Moninckx, Moninckx Atlas vol. 4 (1682–1709)" width="460" height="640">
</section>
{% endblock %}
