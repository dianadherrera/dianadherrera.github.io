{% extends "base.html" %}

{% block body_class %}home{% endblock %}

{% block content %}
<section class="hero">
  <h1>{{ config.title }}</h1>
  <p class="tagline">{{ config.extra.tagline }}</p>
  <nav class="home-nav">
    <a href="/poems/" class="home-link">Poesía</a>
    {% if config.extra.newsletter %}<a href="{{ config.extra.newsletter }}" class="home-link">Boletín</a>{% endif %}
    {% if config.extra.donate %}<a href="{{ config.extra.donate }}" class="home-link">Apoyar</a>{% endif %}
    <a href="/about/" class="home-link">Biografía</a>
  </nav>
  <figure class="hero-illustration">
    <img src="{{ get_url(path='musk-mallow-moninckx.png') }}" alt="Musk Mallow (Abelmoschus moschatus), botanical illustration" width="460" height="640">
    <figcaption>J. Moninckx, <cite>Moninckx Atlas</cite>, vol. 4 (1682&#8211;1709)</figcaption>
  </figure>
</section>
{% endblock %}
