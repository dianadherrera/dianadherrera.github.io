<!DOCTYPE html>
<html lang="{% block lang %}{{ config.default_language }}{% endblock %}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}{{ config.extra.tagline }} — {{ config.title }}{% endblock %}">
  <meta property="og:title" content="{% block og_title %}{{ config.title }}{% endblock %}">
  <meta property="og:type" content="article">
  <meta property="og:description" content="{% block og_description %}{{ config.extra.tagline }} — {{ config.title }}{% endblock %}">
  {% block og_image %}{% endblock %}
  {% if current_url %}<meta property="og:url" content="{{ current_url }}">{% endif %}
  <meta property="og:site_name" content="{{ config.title }}">
  <link rel="icon" href="{{ get_url(path='favicon.svg') }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ get_url(path='style.css') }}">
  <link rel="alternate" type="application/atom+xml" title="{{ config.title }}" href="{{ get_url(path='feed.xml') }}">
</head>
<body class="{% block body_class %}{% endblock %}">
  <header class="site-header">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="/">{{ config.title }}</a>
      {% block breadcrumb %}{% endblock %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="{{ get_url(path='nav.js') }}"></script>
  <footer class="site-footer">
    <p>&copy; {{ config.title }}</p>
    <p class="license"><a href="https://creativecommons.org/licenses/by-nc-nd/4.0/" rel="license">CC BY-NC-ND 4.0</a></p>
  </footer>
</body>
</html>
